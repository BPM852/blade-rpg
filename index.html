<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="刃界錄" />
  <title>刃界錄 — Blade 風文字 RPG</title>
  <!-- 響應式斷點與 Tailwind 對齊: max-md = max-width 767px, md = min-width 768px (未引入 Tailwind CDN,避免 preflight 覆寫既有樣式) -->
  <link rel="manifest" href="/manifest.json" />
  <!-- 暫用 DiceBear bottts（深色底）作賽博機械感占位圖示，日後可改成本地 assets/icon.png -->
  <link rel="icon" type="image/png" sizes="192x192" href="https://api.dicebear.com/7.x/bottts/png?seed=bladerpg&amp;backgroundColor=1a150c&amp;size=192" />
  <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/bottts/png?seed=bladerpg&amp;backgroundColor=1a150c&amp;size=180" />
  <style>
    :root {
      --bg: #000000;
      --gold: #c9a85c;
      --gold-dim: #8a7640;
      --gold-glow: rgba(201, 168, 92, 0.35);
      --border: rgba(201, 168, 92, 0.32);
      --border-metal: #c9a85c;
      --font: "Georgia", "Times New Roman", "Noto Serif TC", serif;
      --mono: ui-monospace, "Cascadia Code", Consolas, monospace;
      --mobile-nav-h: 5.15rem;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: #000000;
      color: var(--gold);
      font-family: var(--font);
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .hidden {
      display: none !important;
    }
    .auth-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .auth-overlay.hidden {
      display: none !important;
    }
    .auth-card {
      width: 100%;
      max-width: 380px;
      border: 1px solid var(--border);
      background: #0a0a0a;
      padding: 1.35rem 1.5rem 1.5rem;
      box-shadow: 0 0 40px var(--gold-glow);
    }
    .auth-card h2 {
      margin: 0 0 0.35rem;
      font-size: 1rem;
      letter-spacing: 0.45em;
      font-weight: 400;
      color: var(--gold-dim);
      text-align: center;
    }
    .auth-card .sub {
      text-align: center;
      font-size: 0.72rem;
      color: var(--gold-dim);
      margin-bottom: 1.1rem;
      letter-spacing: 0.15em;
    }
    .auth-field {
      margin-bottom: 0.75rem;
    }
    .auth-field label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      margin-bottom: 0.35rem;
    }
    .auth-field input {
      width: 100%;
      background: #2d2d2d;
      border: 1px solid #454545;
      border-radius: 4px;
      color: var(--gold);
      padding: 0.5rem 0.65rem;
      font-family: inherit;
      font-size: 0.88rem;
    }
    .auth-field input::placeholder {
      color: var(--gold-dim);
      opacity: 0.85;
    }
    .auth-field input:focus {
      outline: none;
      border-color: var(--gold-dim);
    }
    .auth-actions {
      margin-top: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .auth-actions button.primary {
      background: #1a150c;
      color: var(--gold);
      border: 1px solid var(--border);
      padding: 0.6rem;
      font-family: inherit;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      cursor: pointer;
    }
    .auth-actions button.primary:hover {
      border-color: var(--gold-dim);
      box-shadow: 0 0 14px var(--gold-glow);
    }
    .auth-actions button.ghost {
      background: transparent;
      border: none;
      color: var(--gold-dim);
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      padding: 0.35rem;
    }
    .auth-actions button.ghost:hover {
      color: var(--gold);
    }
    #auth-error {
      color: #c08060;
      font-family: var(--mono);
      font-size: 0.75rem;
      min-height: 1.2em;
      margin-bottom: 0.5rem;
    }
    /* 主遊戲欄：與 Tailwind max-w-[850px] mx-auto 同義，桌機置中；手機仍 100% 寬 */
    .app-shell {
      width: 100%;
      max-width: 850px;
      margin-left: auto;
      margin-right: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #game-root {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      letter-spacing: 0.35em;
      font-size: 0.72rem;
      text-transform: uppercase;
      color: var(--gold-dim);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    header .title-block {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    header strong {
      color: var(--gold);
      font-weight: 400;
    }
    header .player-tag {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: none;
      color: var(--gold-dim);
    }
    header .player-tag span {
      color: var(--gold);
    }
    header .header-actions {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }
    header button.header-btn {
      background: #0c0a06;
      border: 1px solid var(--border);
      color: var(--gold-dim);
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      padding: 0.38rem 0.55rem;
      cursor: pointer;
      font-family: inherit;
    }
    header button.header-btn:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
      box-shadow: 0 0 10px var(--gold-glow);
    }
    header button.header-btn.bingjie {
      color: #9a3a3a;
      border: 1px solid #5a2a2a;
    }
    header button.header-btn.bingjie:hover {
      color: #c45c5c;
      border-color: #7a3535;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
      width: 100%;
    }
    .panel {
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .panel.story-panel {
      flex: 1;
      min-height: 0;
      border-right: none;
    }
    .panel-head {
      padding: 0.5rem 1rem;
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      color: var(--gold-dim);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(201, 168, 92, 0.06);
    }
    .story-panel {
      min-height: 0;
    }
    .story-panel-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    /* 劇情區：敘述／對話極淺灰、純黑底；【】類標題金色；行高 1.8、字距 0.5px 減疲勞 */
    .story-panel-body {
      background: #000000;
    }
    #story-scroll,
    #story-scroll .story-segment-body,
    #story-scroll .story-segment-body--rich,
    #story-scroll .story-segment-body--typing {
      color: #f0f0f0;
      letter-spacing: 0.5px;
    }
    .story-scroll {
      flex: 1 1 0;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem 1.25rem 1.2rem;
      line-height: 1.8;
      font-size: clamp(0.746rem, 1.566vw, 1.146rem);
      color: #f0f0f0;
      background: #000000;
      letter-spacing: 0.5px;
      text-shadow: 0 0 1px rgba(255, 255, 255, 0.18), 0 0 14px rgba(255, 255, 255, 0.05);
      white-space: pre-wrap;
      word-break: break-word;
      scroll-behavior: smooth;
    }
    .story-scroll:empty::before {
      content: "黑幕未揭。選一刃，或自書一行命數。";
      color: rgba(240, 240, 240, 0.5);
    }
    .story-scroll .story-user-line {
      line-height: 1.8;
      font-size: 1em;
      color: #f0f0f0;
      letter-spacing: 0.5px;
      margin-bottom: 1.45em;
      padding: 0.35rem 0 0.35rem 0.55rem;
      border-left: 2px solid rgba(201, 168, 92, 0.35);
      white-space: pre-wrap;
    }
    .story-chronicle-divider {
      height: 0;
      margin: 0.75rem 0 0.95rem;
      border: none;
      border-top: 1px solid rgba(212, 175, 55, 0.42);
      box-shadow: 0 0 14px rgba(201, 168, 92, 0.18);
    }
    .story-segment {
      border-bottom: none;
      padding-bottom: 0.35rem;
      margin-bottom: 0.25rem;
    }
    .story-segment:last-of-type {
      margin-bottom: 0.35rem;
      padding-bottom: 0.5rem;
    }
    .story-segment-body {
      white-space: pre-wrap;
    }
    .story-segment-body--rich {
      white-space: normal;
    }
    #story-scroll .story-narrative-heading {
      color: #c9a85c;
      letter-spacing: 0.5px;
      line-height: 1.8;
      text-shadow: 0 0 1px rgba(201, 168, 92, 0.45), 0 0 14px rgba(201, 168, 92, 0.2);
    }
    .story-scroll.story-scroll--tw-skip {
      cursor: pointer;
    }
    .story-segment-body--typing {
      min-height: 1.8em;
      line-height: 1.8;
    }
    @keyframes story-tw-tail-in {
      from { opacity: 0.28; }
      to { opacity: 1; }
    }
    .story-tw-tail {
      display: inline;
      animation: story-tw-tail-in 0.2s ease-out forwards;
      opacity: 0.28;
    }
    .story-choices.story-choices--await-reveal {
      opacity: 0;
      pointer-events: none;
    }
    .story-choices.story-choices--fade-reveal {
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.42s ease-out;
    }
    .game-root--tw-skip {
      cursor: pointer;
    }
    .causal-settlement {
      position: fixed;
      inset: 0;
      z-index: 850;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.58);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .causal-settlement.hidden {
      display: none !important;
    }
    .causal-settlement-card {
      text-align: center;
      padding: 1.45rem 1.85rem 1.55rem;
      border: 1px solid #c9a85c;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.94);
      box-shadow:
        0 0 32px rgba(201, 168, 92, 0.22),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
      max-width: min(90vw, 320px);
    }
    .causal-settlement-ring {
      width: 46px;
      height: 46px;
      margin: 0 auto 1rem;
      border: 2px solid rgba(201, 168, 92, 0.3);
      border-top-color: #c9a85c;
      border-radius: 50%;
      animation: causal-spin 0.9s linear infinite;
    }
    @keyframes causal-spin {
      to {
        transform: rotate(360deg);
      }
    }
    .causal-settlement-text {
      margin: 0;
      font-size: 0.76rem;
      letter-spacing: 0.38em;
      color: var(--gold-dim);
    }
    .story-choice-preview {
      margin-top: 0.55rem;
      padding: 0.55rem 0.65rem 0.5rem;
      border: 1px solid rgba(201, 168, 92, 0.28);
      border-radius: 8px;
      background: rgba(8, 7, 5, 0.55);
      box-shadow: inset 0 0 20px rgba(201, 168, 92, 0.04);
    }
    .story-choice-preview-inner {
      font-size: 0.82rem;
      line-height: 1.8;
      letter-spacing: 0.5px;
      color: #f0f0f0;
      white-space: normal;
      word-break: break-word;
    }
    .story-choice-preview-line {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 0.35em 0.55em;
      margin-bottom: 0.42em;
      line-height: 1.8;
      letter-spacing: 0.5px;
    }
    .story-choice-preview-line:last-child {
      margin-bottom: 0;
    }
    .story-choice-preview-num {
      color: #c9a85c;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-shadow: 0 0 14px rgba(201, 168, 92, 0.4);
      flex-shrink: 0;
    }
    .story-choice-preview-desc {
      color: #ffffff;
      font-weight: 600;
      letter-spacing: 0.5px;
      flex: 1 1 10em;
      min-width: 0;
    }
    .story-choices {
      flex-shrink: 0;
      width: 100%;
      padding: 0.45rem 0.75rem 0.5rem;
      border-top: 1px solid rgba(201, 168, 92, 0.35);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 0.35rem;
      align-items: stretch;
      background: #000000;
    }
    @media (min-width: 768px) {
      .story-choices {
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: auto;
        gap: 0.45rem;
        padding: 0.5rem 0.85rem 0.6rem;
      }
    }
    .story-choices:empty {
      display: none;
      padding: 0;
      border-top: none;
    }
    button.story-choice-btn {
      text-align: center;
      background: #000000;
      color: #c9a85c;
      border: 1px solid #c9a85c;
      border-radius: 6px;
      padding: 10px 8px;
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      line-height: 1;
      min-height: 0;
      height: auto;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, color 0.2s, background 0.2s;
      box-shadow:
        0 0 10px rgba(201, 168, 92, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      white-space: nowrap;
    }
    button.story-choice-btn:hover:not(:disabled):not(.story-action-slot--ghost) {
      color: #f0e6c8;
      border-color: #e4d4a8;
      box-shadow:
        0 0 20px rgba(201, 168, 92, 0.35),
        0 0 36px rgba(201, 168, 92, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }
    button.story-choice-btn:disabled {
      cursor: not-allowed;
    }
    button.story-choice-btn.story-action-slot--ghost {
      opacity: 0.2;
      pointer-events: none;
      border-style: dashed;
      box-shadow: none;
      color: var(--gold-dim);
    }
    button.story-choice-btn--tagged {
      color: #f8f6f2 !important;
      font-weight: 800;
      border-color: rgba(255, 240, 200, 0.45);
      box-shadow: 0 0 12px rgba(255, 220, 160, 0.22), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }
    button.story-choice-btn--tagged:hover:not(:disabled) {
      border-color: rgba(255, 235, 190, 0.65);
      box-shadow: 0 0 16px rgba(255, 220, 160, 0.35), inset 0 0 0 1px rgba(255, 255, 255, 0.12);
    }
    .stat-list {
      padding: 1rem;
      flex: 1;
      overflow-y: auto;
    }
    .stat-row {
      margin-bottom: 1rem;
    }
    .stat-row--sidebar-meta {
      margin-bottom: 0.72rem;
    }
    .stat-rank-line {
      display: inline-flex;
      align-items: center;
      gap: 0.28rem;
      max-width: 72%;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .rank-core-hint {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 0.95rem;
      height: 0.95rem;
      border-radius: 50%;
      border: 1px solid var(--border);
      color: var(--gold-dim);
      font-size: 0.58rem;
      font-weight: 800;
      font-style: italic;
      cursor: help;
      flex-shrink: 0;
      line-height: 1;
    }
    .rank-core-hint:hover {
      color: var(--gold);
      border-color: var(--gold-dim);
    }
    .stat-mental-heading {
      font-weight: 900;
    }
    .stat-row label {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      color: var(--gold-dim);
      margin-bottom: 0.35rem;
    }
    .stat-row label span.val {
      color: var(--gold);
      font-family: var(--mono);
      font-size: 0.8rem;
    }
    .bar {
      height: 8px;
      background: #1a150c;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow:
        0 0 12px rgba(201, 168, 92, 0.18),
        0 0 24px rgba(201, 168, 92, 0.07),
        inset 0 0 10px rgba(0, 0, 0, 0.65);
    }
    /* 道行：加粗＋略強金色光暈（屬性彈窗內） */
    #game-stat-list .stat-row:has(#b-cultivation) .bar {
      height: 11px;
      border-radius: 5px;
      box-shadow:
        0 0 16px rgba(201, 168, 92, 0.28),
        0 0 32px rgba(201, 168, 92, 0.12),
        inset 0 0 12px rgba(0, 0, 0, 0.68);
    }
    #game-stat-list .stat-row:has(#b-cultivation) .bar > i {
      border-radius: 3px;
      box-shadow:
        0 0 14px rgba(201, 168, 92, 0.45),
        0 0 28px rgba(201, 168, 92, 0.32),
        0 0 44px rgba(255, 220, 160, 0.18);
    }
    .bar > i {
      display: block;
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      box-shadow:
        0 0 10px rgba(201, 168, 92, 0.38),
        0 0 22px rgba(201, 168, 92, 0.22);
      width: 0%;
      transition: width 0.45s ease;
    }
    footer.actions {
      border-top: 1px solid var(--border);
      padding: 0.85rem 1rem 1.1rem;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.5rem;
    }
    footer.actions .actions-row--dock,
    footer.actions .actions-row--secondary {
      display: contents;
    }
    @media (max-width: 800px) {
      #game-root .story-choices {
        gap: 0.35rem;
        padding-left: 12px;
        padding-right: 12px;
      }
    }
    @media (max-width: 640px) {
      footer.actions { grid-template-columns: repeat(2, 1fr); }
    }

    /* max-md：等同 Tailwind (max-width: 767px)，手機／小平板極致收緊底部操作列 */
    @media (max-width: 767px) {
      /* 遊戲進行中鎖定視窗高度，避免鍵盤／捲動把整頁佈局扯裂；登入層仍可由 auth-overlay 覆蓋 */
      body:has(#game-root:not(.hidden)) {
        height: 100dvh;
        max-height: 100dvh;
        overflow: hidden;
      }
      #game-root {
        flex: 1;
        min-height: 0;
        max-height: 100dvh;
        overflow: hidden;
        /* 五鍵合併為固定雙列矩陣後，預留高度收緊 */
        --mobile-nav-h: 2.72rem;
        padding-bottom: calc(var(--mobile-nav-h) + env(safe-area-inset-bottom, 0px));
      }
      #game-root > main {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        overflow: hidden;
        padding-left: 0;
        padding-right: 0;
      }
      #game-root main .panel.story-panel {
        flex: 1 1 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      #game-root .story-panel-body {
        flex: 1 1 0;
        min-height: 0;
      }
      #game-root #story-scroll {
        flex: 1 1 0;
        min-height: 60dvh;
      }
      #game-root > header {
        padding-left: 20px;
        padding-right: 20px;
        flex-shrink: 0;
      }
      #game-root .panel-head {
        padding-left: 20px;
        padding-right: 20px;
      }
      #game-root .story-scroll {
        padding: 0.55rem 14px 0.45rem;
        line-height: 1.8;
        font-size: clamp(0.95rem, 3.6vw, 1.12rem);
        letter-spacing: 0.5px;
        scroll-padding-bottom: 1.2rem;
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        color: #f0f0f0;
        background: #000000;
      }
      #game-root .story-scroll .story-segment-body,
      #game-root .story-scroll .story-segment-body--rich,
      #game-root .story-scroll .story-user-line {
        line-height: 1.8;
        letter-spacing: 0.5px;
        color: #f0f0f0;
      }
      #game-root #story-scroll .story-narrative-heading {
        color: #c9a85c;
      }
      #game-root .story-choices {
        padding: 3px 10px 4px;
        gap: 3px;
        flex-shrink: 0;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }
      #game-root button.story-choice-btn {
        padding: 5px 4px;
        min-height: 0;
        border-radius: 5px;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        display: flex;
        align-items: center;
        justify-content: center;
      }

    function resolveGameConfirm(value) {
      const root = document.getElementById("game-confirm-root");
      if (root) {
        root.classList.add("hidden");
        root.setAttribute("aria-hidden", "true");

      const fn = gameConfirmResolver;

      if (fn) fn(!!value);

      document.getElementById("game-confirm-ok")?.addEventListener("click", () => resolveGameConfirm(true));

      root?.querySelectorAll("[data-game-confirm-dismiss]").forEach((el) => {
        el.addEventListener("click", () => {

        });
      });
      document.addEventListener("keydown", (ev) => {
        if (!gameConfirmResolver || !root || root.classList.contains("hidden")) return;

    function normalizeClientInventory(raw) {
      const cur = { silver: 0, spirit_stone: 0, credit: 0 };
      const out = { currencies: { ...cur }, items: [] };
      if (!raw || typeof raw !== "object") return out;
      if (raw.currencies && typeof raw.currencies === "object") {
        if (raw.currencies.silver != null) out.currencies.silver = Math.max(0, Number(raw.currencies.silver) || 0);
        if (raw.currencies.spirit_stone != null) out.currencies.spirit_stone = Math.max(0, Number(raw.currencies.spirit_stone) || 0);
        if (raw.currencies.credit != null) out.currencies.credit = Math.max(0, Number(raw.currencies.credit) || 0);
      }
      if (Array.isArray(raw.items)) {
        raw.items.forEach((row) => {
          if (!row || typeof row !== "object" || !row.name) return;
          const qty = Math.max(0, Number(row.quantity) || 0);
          if (qty <= 0) return;
          out.items.push({
            id: String(row.id || row.name),
            name: String(row.name),
            category: String(row.category || "material"),
            quantity: qty,
            equipped: !!row.equipped,
            description: row.description != null ? String(row.description) : "",
          });
        });
        return out;
      }
      Object.keys(raw).forEach((name) => {
        if (["version", "items", "currencies"].includes(name)) return;
        const val = raw[name];
        out.items.push({
          id: "legacy_" + name,
          name,
          category: "material",
          quantity: 1,
          equipped: false,
          description: typeof val === "string" ? val : "",
        });
      });
      return out;
    }

    function maHumanizeJsonText(s) {
      const t = String(s).trim();
      if (!t || (!t.startsWith("{") && !t.startsWith("["))) return t;
      try {
        const o = JSON.parse(t);
        if (o && typeof o === "object" && !Array.isArray(o)) {
          return Object.entries(o)
            .map(([k, v]) => k + ":" + (v != null ? String(v) : ""))
            .join(";");
        }
        if (Array.isArray(o)) return o.map((x) => String(x)).join(",");
      } catch { /* ignore */ }
      return t.replace(/["{}[\]]/g, " ").replace(/\s+/g, " ").trim();
    }

    function maNormalizeSkillArray(x) {
      if (x == null) return [];
      if (Array.isArray(x)) return x;
      if (typeof x === "string") {
        const t = x.trim();
        if (!t || t === "[]") return [];
        try {
          const p = JSON.parse(t);
          if (Array.isArray(p)) return p;
          if (p && typeof p === "object") return [p];
        } catch { return []; }
        return [];
      }
      if (typeof x === "object") return [x];
      return [];
    }

    function maRealmZh(inRealm, inTier) {
      const raw = String(inRealm || "").trim();
      let tier = String(inTier || "").toLowerCase();
      if (tier !== "high" && tier !== "mid" && tier !== "low") {
        const rj = raw.toLowerCase();
        if (/登峰|造極|legendary|supreme|transcendent/.test(raw) || /grandmaster|legend/.test(rj)) tier = "high";
        else if (/融會|貫通|大成|圓滿|化境|通神|master\b|expert\b/.test(raw) || /\bmaster\b|\bexpert\b/.test(rj)) tier = "high";
        else if (/略有小成|小成|精通|熟練|登堂|intermediate|adept|journeyman/.test(raw) || /\badept\b|\bintermediate\b/.test(rj)) tier = "mid";
        else tier = "low";
      }
      if (/登峰|造極/.test(raw)) return { label: "登峰造極", tier: "high" };
      if (/融會|貫通/.test(raw)) return { label: "融會貫通", tier: "high" };
      if (/略有小成/.test(raw)) return { label: "略有小成", tier: "mid" };
      if (/小成|精通|熟練/.test(raw)) return { label: "略有小成", tier: "mid" };
      if (/初窺|入門|粗淺/.test(raw)) return { label: "初窺門徑", tier: "low" };
      if (/novice|beginner|initiate|basic/i.test(raw)) return { label: "初窺門徑", tier: "low" };
      if (/intermediate|adept|journeyman/i.test(raw)) return { label: "略有小成", tier: "mid" };
      if (/grandmaster|legend|supreme|transcendent/i.test(raw)) return { label: "登峰造極", tier: "high" };
      if (/\bmaster\b|\bexpert\b/i.test(raw)) return { label: "融會貫通", tier: "high" };
      if (tier === "high") return { label: "融會貫通", tier: "high" };
      if (tier === "mid") return { label: "略有小成", tier: "mid" };
      return { label: "初窺門徑", tier: "low" };
    }

    function maStructuredItemToRow(item, opts) {
      const cat = opts.category;
      const skillGroup = opts.skillGroup;
      const defaultRealm = opts.defaultRealm;
      if (item == null) return null;
      if (typeof item === "string") {
        const t = item.trim();
        if (!t) return null;
        if (t.startsWith("{") || t.startsWith("[")) {
          try {
            return maStructuredItemToRow(JSON.parse(t), opts);
          } catch {
            return null;
          }
        }
        const rd = maRealmZh(defaultRealm || "", "low");
        return {
          id: "sk_" + t + "_" + skillGroup + "_" + cat,
          name: t,
          description: "",
          category: cat,
          skillGroup,
          realm: rd.label,
          realm_tier: rd.tier,
          fusion_percent: cat === "augment" ? 0 : 0,
        };
      }
      if (typeof item !== "object") return null;
      let name = String(item.name || item.title || item.technique || item.skill || item.label || "").trim();
      let fromKeyVal = "";
      if (!name) {
        const skipK = new Set(["realm", "境界", "realm_tier", "tier", "desc", "description", "detail", "note", "text", "fusion_percent", "fusion", "sync", "integration", "id", "category", "skillGroup", "grade", "品階", "tier_grade", "origin", "來源"]);
        const keys = Object.keys(item).filter((k) => !skipK.has(k));
        if (keys.length === 1) {
          const k0 = keys[0];
          const v0 = item[k0];
          if (typeof v0 === "string" || typeof v0 === "number") {
            name = k0.trim();
            fromKeyVal = String(v0);
          } else if (v0 && typeof v0 === "object") {
            return maStructuredItemToRow({ ...v0, name: v0.name || k0 }, opts);
          }
        }
      }
      if (!name) return null;
      let desc = item.description ?? item.desc ?? item.detail ?? item.note ?? item.text ?? "";
      if (fromKeyVal && !String(desc).trim()) desc = fromKeyVal;
      desc = maHumanizeJsonText(String(desc));
      const rd = maRealmZh(item.realm || item.境界 || item.stage || defaultRealm || "", item.realm_tier || item.tier);
      let fusion = Math.max(0, Math.min(100, Number(item.fusion_percent ?? item.fusion ?? item.sync ?? item.integration ?? 0)));
      if (cat === "augment" && !fusion && desc) {
        const m = desc.match(/(\d{1,3})\s*%/);
        if (m) fusion = Math.min(100, parseInt(m[1], 10));
      }
      const gradeRaw = item.grade != null ? item.grade : item.品階 != null ? item.品階 : item.tier_grade;
      const grade = gradeRaw != null ? String(gradeRaw).trim() : "";
      const originRaw = item.origin != null ? item.origin : item.來源;
      const origin = originRaw != null ? String(originRaw).trim() : "";
      const row = {
        id: String(item.id || name + "_" + skillGroup + "_" + cat),
        name,
        description: desc,
        category: cat,
        skillGroup,
        realm: rd.label,
        realm_tier: rd.tier,
        fusion_percent: cat === "augment" ? fusion : 0,
      };
      if (grade) row.grade = grade;
      if (origin) row.origin = origin;
      return row;
    }

    function maAbsorbStructuredFields(v, pushRow) {
      maNormalizeSkillArray(v.techniques).forEach((it) => {
        const r = maStructuredItemToRow(it, { category: "external", skillGroup: "technique" });
        if (r) pushRow(r);
      });
      maNormalizeSkillArray(v.forbidden_spells).forEach((it) => {
        const r = maStructuredItemToRow(it, { category: "external", skillGroup: "forbidden", defaultRealm: "初窺門徑" });
        if (r) pushRow(r);
      });
      maNormalizeSkillArray(v.progress).forEach((it) => {
        const r = maStructuredItemToRow(it, { category: "internal", skillGroup: "progress", defaultRealm: "略有小成" });
        if (r) pushRow(r);
      });
      maNormalizeSkillArray(v.cybernetic_modifications).forEach((it) => {
        const r = maStructuredItemToRow(it, { category: "augment", skillGroup: "cyber" });
        if (r) pushRow(r);
      });
    }

    function normalizeClientSkills(raw, martialLegacy) {
      const out = { entries: [] };
      const STRUCT_SKIP = new Set([
        "version", "entries", "currencies", "items",
        "techniques", "forbidden_spells", "progress", "cybernetic_modifications",
      ]);

      const pushRow = (row) => {
        if (row == null) return;
        if (typeof row === "string") {
          const t = row.trim();
          if (!t) return;
          try {
            row = JSON.parse(t);
          } catch {
            pushRow({ name: t, realm: "初窺門徑", category: "external", skillGroup: "technique" });
            return;
          }
        }
        if (!row || typeof row !== "object") return;
        const name = row.name != null ? String(row.name).trim() : "";
        if (!name) return;
        let cat = String(row.category || "external").toLowerCase();
        if (cat === "外功" || cat === "招式") cat = "external";
        else if (cat === "內功" || cat === "氣功") cat = "internal";
        else if (cat === "心法" || cat === "根本") cat = "heart";
        else if (cat === "改造" || cat === "植入" || cat === "augment") cat = "augment";
        if (!["external", "internal", "heart", "augment"].includes(cat)) cat = "external";
        const rd = maRealmZh(row.realm || row.境界 || "", row.realm_tier || row.tier);
        let desc = row.description != null ? String(row.description) : (row.desc != null ? String(row.desc) : "");
        desc = maHumanizeJsonText(desc);
        const fusion = Math.max(0, Math.min(100, Number(row.fusion_percent ?? row.fusion) || 0));
        const sg = row.skillGroup;
        const skillGroup = sg === "forbidden" ? "forbidden" : sg === "progress" ? "progress" : sg === "cyber" ? "cyber" : cat === "external" ? "technique" : sg || null;
        const grade = row.grade != null ? String(row.grade).trim() : (row.品階 != null ? String(row.品階).trim() : "");
        let origin = row.origin != null ? String(row.origin).trim() : "";
        if (!origin && row.來源 != null) origin = String(row.來源).trim();
        const ent = {
          id: String(row.id || name + "_" + (skillGroup || cat)),
          name,
          category: cat,
          skillGroup,
          realm: rd.label,
          realm_tier: rd.tier,
          description: desc,
          fusion_percent: cat === "augment" ? fusion : 0,
        };
        if (grade) ent.grade = grade;
        if (origin) ent.origin = origin;
        out.entries.push(ent);
      };

      function absorbSource(src) {
        if (src == null || src === "") return;
        let v = src;
        if (typeof v === "string") {
          const t = v.trim();
          if (!t || t === "{}") return;
          try {
            v = JSON.parse(t);
          } catch {
            return;
          }
        }
        if (Array.isArray(v)) {
          v.forEach((row) => pushRow(row));
          return;
        }
        if (typeof v !== "object") return;
        maAbsorbStructuredFields(v, pushRow);
        const ent = v.entries;
        if (Array.isArray(ent)) {
          ent.forEach((row) => pushRow(row));
        } else if (typeof ent === "string") {
          try {
            const inner = JSON.parse(ent.trim());
            if (Array.isArray(inner)) inner.forEach((row) => pushRow(row));
          } catch { /* ignore */ }
        }
        const keys = Object.keys(v).filter((k) => !STRUCT_SKIP.has(k));
        for (const k of keys) {
          const val = v[k];
          if (val && typeof val === "object" && !Array.isArray(val)) {
            pushRow({ ...val, name: val.name || k });
          } else if (typeof val === "string") {
            pushRow({ name: k, description: val, realm: "初窺門徑", category: "external", skillGroup: "technique" });
          }
        }
      }

      absorbSource(raw);
      if (!out.entries.length) absorbSource(martialLegacy);
      return out;
    }

    function clientCompanionId(name) {
      let h = 2166136261;
      const s = String(name);
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return "cp_" + (h >>> 0).toString(16);
    }

    function sanitizeCompanionRow(d, fallbackName) {
      const name = String((d && d.name) || fallbackName || "無名之影").trim() || "無名之影";
      let favor = Number(
        d && (d.favor_percent != null ? d.favor_percent : d.favor != null ? d.favor : d.好感度),
      );
      if (Number.isNaN(favor)) favor = 50;
      favor = Math.max(0, Math.min(100, Math.round(favor)));
      const id = String((d && d.id) || "").trim() || clientCompanionId(name);
      return {
        id,
        name,
        title: String((d && d.title) || (d && d.頭銜) || "").trim(),
        race_or_faction: String(
          (d && d.race_or_faction) || (d && d.race) || (d && d.faction) || (d && d.種族) || (d && d.陣營) || "",
        ).trim(),
        favor_percent: favor,
        status: String((d && d.status) || (d && d.狀態) || "平穩").trim() || "平穩",
        backstory: String((d && d.backstory) || (d && d.background) || (d && d.背景) || "").trim(),
        visual: String((d && d.visual) || (d && d.視覺) || "").trim(),
        signature_ability: String(
          (d && d.signature_ability) || (d && d.ability) || (d && d.special) || (d && d.異質手段) || "",
        ).trim(),
        memory_note: String((d && d.memory_note) || (d && d.memory) || "").trim(),
      };
    }

    function normalizeClientCompanions(raw) {
      const out = { version: 1, entries: [] };
      if (raw == null) return out;
      if (Array.isArray(raw)) {
        raw.forEach((row) => {
          if (row && typeof row === "object") out.entries.push(sanitizeCompanionRow(row));
        });
        return out;
      }
      if (typeof raw === "object") {
        const ent = raw.entries;
        if (Array.isArray(ent)) {
          ent.forEach((row) => {
            if (row && typeof row === "object") out.entries.push(sanitizeCompanionRow(row));
          });
          return out;
        }
        Object.keys(raw).forEach((k) => {
          if (k === "version" || k === "entries") return;
          const v = raw[k];
          if (v && typeof v === "object" && !Array.isArray(v)) {
            out.entries.push(sanitizeCompanionRow({ ...v, name: v.name || k }));
          } else if (typeof v === "string") {
            out.entries.push(sanitizeCompanionRow({ name: k, backstory: v }));
          }
        });
      }
      return out;
    }

    function normalizeStatsFromServer(s) {
      const out = { ...DEFAULT_STATS };
      if (!s || typeof s !== "object") return out;
      STAT_KEYS.forEach((k) => {
        if (s[k] == null || s[k] === "") return;
        const n = Number(s[k]);
        if (!Number.isNaN(n)) out[k] = Math.max(1, Math.min(100, Math.round(n)));
      });
      return out;
    }

    function stripAttrFromNarrative(text) {
      return String(text).replace(/\s*\[ATTR:\s*[^\]]+\]\s*$/i, "").trim();
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function wrapStoryBracketHeadings(escapedPlain) {
      return escapedPlain.split(/\r\n|\r|\n/).map((line) => {
        const t = line.trim();
        if (/^【[^】]{1,48}】$/.test(t)) {
          return `<span class="story-narrative-heading">${t}</span>`;
        }
        return line;
      }).join("<br />");
    }

    function narrativeToSafeHtml(text) {
      return wrapStoryBracketHeadings(escapeHtml(String(text)));
    }

    function setNarrativeHtml(el, text) {
      if (!el) return;
      el.classList.add("story-segment-body--rich");
      el.innerHTML = narrativeToSafeHtml(text);
    }

    function unwrapMarkdownFence(text) {
      let t = String(text || "").trim();
      const m = t.match(/^```(?:json)?\s*([\s\S]*?)```$/i);
      if (m) return m[1].trim();
      return t;
    }

    function extractFirstBalancedJsonObject(text) {
      const s = String(text || "");
      const start = s.indexOf("{");
      if (start < 0) return null;
      let depth = 0;
      let inString = false;
      let esc = false;
      for (let i = start; i < s.length; i++) {
        const c = s[i];
        if (inString) {
          if (esc) esc = false;
          else if (c === "\\") esc = true;
          else if (c === "\"") inString = false;
          continue;
        }
        if (c === "\"") {
          inString = true;
          continue;
        }
        if (c === "{") depth++;
        else if (c === "}") {
          depth--;
          if (depth === 0) return s.slice(start, i + 1);
        }
      }
      return null;
    }

    function tryParseAiJsonPayload(raw) {
      const t = unwrapMarkdownFence(String(raw || "").trim());
      if (!t) return { ok: false, value: null };
      try {
        const o = JSON.parse(t);
        if (o && typeof o === "object" && !Array.isArray(o)) return { ok: true, value: o };
      } catch (_) { /* fall through */ }
      const blob = extractFirstBalancedJsonObject(t);
      if (blob) {
        try {
          const o = JSON.parse(blob);
          if (o && typeof o === "object" && !Array.isArray(o)) return { ok: true, value: o };
        } catch (_) { /* ignore */ }
      }
      return { ok: false, value: null };
    }

    function stripBalancedJsonObjectsFromText(text) {
      let t = String(text || "").trim();
      for (let n = 0; n < 48; n++) {
        const blob = extractFirstBalancedJsonObject(t);
        if (!blob) break;
        try {
          const o = JSON.parse(blob);
          if (o !== null && typeof o === "object") {
            t = t.replace(blob, " ").replace(/\s+/g, " ").trim();
            continue;
          }
        } catch (_) { /* ignore */ }
        break;
      }
      return t.trim();
    }

    function mergeParsedIntoCurrentGameState(parsed) {
      if (!parsed || typeof parsed !== "object" || !currentGameState || typeof currentGameState !== "object") return;
      if (parsed.stats && typeof parsed.stats === "object") {
        currentGameState.stats = { ...(currentGameState.stats || {}) };
        STAT_KEYS.forEach((k) => {
          if (parsed.stats[k] == null || parsed.stats[k] === "") return;
          const n = Number(parsed.stats[k]);
          if (!Number.isNaN(n)) currentGameState.stats[k] = Math.max(1, Math.min(100, Math.round(n)));
        });
      }
      if (parsed.inventory != null && typeof parsed.inventory === "object") {
        currentGameState.inventory = parsed.inventory;
      } else if (currentGameState.inventory && typeof currentGameState.inventory === "object") {
        if (parsed.currencies != null && typeof parsed.currencies === "object") {
          currentGameState.inventory = {
            ...currentGameState.inventory,
            currencies: { ...(currentGameState.inventory.currencies || {}), ...parsed.currencies },
          };
        }
        if (parsed.items != null && Array.isArray(parsed.items)) {
          currentGameState.inventory = { ...currentGameState.inventory, items: parsed.items };
        }
      }
      if (parsed.skills != null) currentGameState.skills = parsed.skills;
      else if (parsed.martial_arts != null) currentGameState.skills = parsed.martial_arts;
      if (parsed.companions != null) {
        const cur = normalizeClientCompanions(currentGameState.companions);
        const rows = normalizeClientCompanions(parsed.companions).entries;
        rows.forEach((row) => {
          const i = cur.entries.findIndex((x) => x.id === row.id || x.name === row.name);
          if (i < 0) cur.entries.push(row);
          else cur.entries[i] = { ...cur.entries[i], ...row, id: cur.entries[i].id };
        });
        currentGameState.companions = cur;
      }
      if (parsed.current_location != null && typeof parsed.current_location === "object") {
        currentGameState.current_location = {
          ...normalizeLocationFromServer(currentGameState.current_location),
          ...normalizeLocationFromServer(parsed.current_location),
        };
      }
      if (parsed.quests != null && typeof parsed.quests === "object") {
        currentGameState.quests = { ...(currentGameState.quests || {}), ...parsed.quests };
      }
      if (parsed.rank != null && String(parsed.rank).trim()) {
        currentGameState.rank = String(parsed.rank).trim().slice(0, 48);
      }
      if (parsed.status != null && String(parsed.status).trim()) {
        currentGameState.status = String(parsed.status).trim().slice(0, 48);
      }
      if (parsed.mental_state != null && String(parsed.mental_state).trim()) {
        currentGameState.mental_state = String(parsed.mental_state).trim().slice(0, 48);
      }
      stats = normalizeStatsFromServer(currentGameState.stats);
      setBars();
    }

    function parseAssistantDisplayBundle(content) {
      const raw = String(content || "");
      const pr = tryParseAiJsonPayload(raw);
      let choicesFromJson = [];
      if (pr.ok && pr.value && Array.isArray(pr.value.choices)) {
        choicesFromJson = pr.value.choices.map((x) => String(x).trim()).filter(Boolean);
      }
      let narrative = "";
      if (pr.ok && pr.value && typeof pr.value.narrative === "string") {
        narrative = stripAttrFromNarrative(pr.value.narrative).trim();
      }
      if (!narrative && !pr.ok) {
        narrative = stripBalancedJsonObjectsFromText(stripAttrFromNarrative(raw).trim()).trim();
        if (!narrative) narrative = stripAttrFromNarrative(raw).trim();
      }
      return { narrative, choicesFromJson, parsed: pr.ok ? pr.value : null, parseOk: pr.ok };
    }

    const CHOICE_LINE_RE = /^\s*(\d+)[.．、]\s*(.+)$/;
    const CHOICE_RESOURCE_TAG_RE = /[\[［][^\]］]*(?:物品|武學|同伴|消耗)[^\]］]*[\]］]/;

    function choiceLineHasResourceTag(line) {
      return CHOICE_RESOURCE_TAG_RE.test(String(line || ""));
    }

    function decorateChoiceButton(btn, line, modalChoice) {
      const base = modalChoice ? "game-modal-choice-btn" : "story-choice-btn";
      btn.className = base + (choiceLineHasResourceTag(line) ? " " + base + "--tagged" : "");
    }

    function splitNarrativeAndChoices(text) {
      const rawLines = String(stripAttrFromNarrative(text)).split(/\r?\n/);
      let firstChoiceIdx = -1;
      for (let i = 0; i < rawLines.length; i++) {
        const t = rawLines[i].trim();
        if (!t) continue;
        if (CHOICE_LINE_RE.test(t)) {
          firstChoiceIdx = i;
          break;
        }
      }
      if (firstChoiceIdx < 0) return { body: text, choices: [] };
      const choiceLines = [];
      for (let i = firstChoiceIdx; i < rawLines.length; i++) {
        const t = rawLines[i].trim();
        if (!t) continue;
        if (CHOICE_LINE_RE.test(t)) choiceLines.push(t);
        else break;
      }
      const body = rawLines.slice(0, firstChoiceIdx).join("\n").trimEnd();
      return { body, choices: choiceLines };
    }

    function storyChoicesFromBundle(bundle) {
      const split = splitNarrativeAndChoices(bundle.narrative);
      if (bundle.choicesFromJson.length > 0) {
        const lines = bundle.choicesFromJson.map((c, i) => String(i + 1) + ". " + c);
        return { body: split.body, choices: lines };
      }
      return split;
    }

    function parseAssistantNarrative(content) {
      return parseAssistantDisplayBundle(content).narrative;
    }

    function filterMessagesForStory(msgs) {
      if (!Array.isArray(msgs)) return [];
      const out = [];
      for (let i = 0; i < msgs.length; i++) {
        const m = msgs[i];
        if (
          m.role === "user" &&
          typeof m.content === "string" &&
          (m.content.includes("【面板|") || m.content.includes("【面板｜"))
        ) {
          if (i + 1 < msgs.length && msgs[i + 1].role === "assistant") i++;
          continue;
        }
        out.push(m);
      }
      return out;
    }

    function formatUserActionLine(raw) {
      if (!raw) return "";
      const s = String(raw).replace(/^【玩家行動】\s*/, "").trim();
      return s || String(raw).trim();
    }

    function scrollStoryToBottom() {
      if (!storyScrollEl) return;
      requestAnimationFrame(() => {
        const el = storyScrollEl;
        const top = el.scrollHeight;
        try {
          el.scrollTo({ top, behavior: "smooth" });
        } catch (_) {
          el.scrollTop = top;
        }
        requestAnimationFrame(() => {
          if (Math.abs(el.scrollHeight - el.scrollTop - el.clientHeight) > 4) {
            el.scrollTop = el.scrollHeight;
          }
          requestAnimationFrame(() => {
            if (!storyScrollEl) return;
            const e2 = storyScrollEl;
            if (Math.abs(e2.scrollHeight - e2.scrollTop - e2.clientHeight) > 6) {
              e2.scrollTop = e2.scrollHeight;
            }
          });
        });
      });
    }

    /** 劇情區外側(選項列等)重排後再對齊底部,避免一次捲動時 scrollHeight 尚未穩定 */
    function scheduleStoryScrollLockToEnd() {
      scrollStoryToBottom();
      const bump = () => {
        if (!storyScrollEl) return;
        storyScrollEl.scrollTop = storyScrollEl.scrollHeight;
      };
      requestAnimationFrame(bump);
      setTimeout(bump, 90);
      setTimeout(bump, 280);
    }

    function appendChronicleDivider() {
      if (!storyScrollEl || storyScrollEl.children.length === 0) return;
      const div = document.createElement("div");
      div.className = "story-chronicle-divider";
      div.setAttribute("role", "presentation");
      storyScrollEl.appendChild(div);
    }

    function splitNarrativeForTypewriter(text) {
      const s = String(text || "");
      const lines = [];
      let buf = "";
      const pushBuf = () => {
        const t = buf.trim();
        if (t) lines.push(t);
        buf = "";
      };
      for (let i = 0; i < s.length; i++) {
        const c = s[i];
        if (c === "\r") continue;
        if (c === "\n") {
          pushBuf();
          continue;
        }
        buf += c;
        if (/[。！？!?]/.test(c)) pushBuf();
      }
      pushBuf();
      return lines;
    }

    function typewriterHtmlWithTail(acc) {
      const g = [...acc];
      if (g.length === 0) return "";
      const last = g.pop();
      const rest = g.join("");
      const base = narrativeToSafeHtml(rest);
      if (last === "\n") return base + "<br /><span class=\"story-tw-tail\">\u200b</span>";
      return base + "<span class=\"story-tw-tail\">" + escapeHtml(last) + "</span>";
    }

    function detachStoryTypewriterSkip() {
      if (storyTypewriterSkipHandler && gameRoot) {
        gameRoot.removeEventListener("click", storyTypewriterSkipHandler, true);
        storyTypewriterSkipHandler = null;
      }
      if (gameRoot) gameRoot.classList.remove("game-root--tw-skip");
    }

    const STORY_CHOICE_DIGIT_MAX = 4;

    function choiceLinePlainText(line) {
      const m = String(line || "").trim().match(/^\s*(\d+)[.．、]\s*(.+)$/);
      return m ? m[2].trim() : String(line || "").trim();
    }

    function formatChoicePreviewText(choiceLines) {
      if (!choiceLines || !choiceLines.length) return "";
      return choiceLines
        .map((line, i) => {
          const m = String(line).trim().match(/^\s*(\d+)[.．、]\s*(.+)$/);
          const n = m ? m[1] : String(i + 1);
          const t = m ? m[2].trim() : String(line).trim();
          return n + ". " + t;
        })
        .join("\n");
    }

    function appendChoicePreviewBlock(segEl, choiceLines) {
      if (!segEl || !choiceLines || !choiceLines.length) return;
      Array.from(segEl.children).forEach((c) => {
        if (c.classList && c.classList.contains("story-choice-preview")) c.remove();
      });
      const wrap = document.createElement("div");
      wrap.className = "story-choice-preview";
      const inner = document.createElement("div");
      inner.className = "story-choice-preview-inner";
      choiceLines.forEach((line, i) => {
        const m = String(line).trim().match(/^\s*(\d+)[.．、]\s*(.+)$/);
        const n = m ? m[1] : String(i + 1);
        const t = m ? m[2].trim() : String(line).trim();
        const row = document.createElement("div");
        row.className = "story-choice-preview-line";
        const numEl = document.createElement("span");
        numEl.className = "story-choice-preview-num";
        numEl.textContent = n + ".";
        const descEl = document.createElement("span");
        descEl.className = "story-choice-preview-desc";
        descEl.textContent = t;
        row.appendChild(numEl);
        row.appendChild(descEl);
        inner.appendChild(row);
      });
      wrap.appendChild(inner);
      segEl.appendChild(wrap);
    }

    function choiceLineToModalButtonHtml(line) {
      const m = String(line || "").trim().match(/^\s*(\d+)[.．、]\s*(.+)$/);
      if (!m) return escapeHtml(String(line || ""));
      return (
        '<span class="game-modal-choice-num">' +
        escapeHtml(m[1] + ".") +
        '</span><span class="game-modal-choice-desc">' +
        escapeHtml(m[2].trim()) +
        "</span>"
      );
    }

    function setCausalSettlementVisible(on) {
      const el = document.getElementById("causal-settlement");
      if (!el) return;
      if (on) {
        const txt = el.querySelector(".causal-settlement-text");
        if (txt) {
          const pick =
            window.BladeCausalSettlement && typeof window.BladeCausalSettlement.pickPhrase === "function"
              ? window.BladeCausalSettlement.pickPhrase()
              : "正在結算因果...";
          txt.textContent = pick;
        }
      }
      el.classList.toggle("hidden", !on);
      el.setAttribute("aria-hidden", on ? "false" : "true");
    }

    function revealStoryChoicesFadeIn(choiceLines) {
      if (!storyChoicesEl) return;
      storyChoicesEl.classList.remove("story-choices--await-reveal", "story-choices--fade-reveal");
      storyChoicesEl.innerHTML = "";
      if (!choiceLines || !choiceLines.length) return;
      const slice = choiceLines.slice(0, STORY_CHOICE_DIGIT_MAX);
      for (let i = 0; i < STORY_CHOICE_DIGIT_MAX; i++) {
        const btn = document.createElement("button");
        btn.type = "button";
        const num = String(i + 1);
        btn.textContent = num;
        if (i < slice.length) {
          const line = slice[i];
          decorateChoiceButton(btn, line, false);
          const hint = choiceLinePlainText(line);
          btn.setAttribute("aria-label", "選項 " + num + ": " + hint);
          btn.title = hint;
          btn.addEventListener("click", () => takeTurn(num));
        } else {
          btn.className = "story-choice-btn story-action-slot--ghost";
          btn.disabled = true;
          btn.setAttribute("aria-hidden", "true");
        }
        storyChoicesEl.appendChild(btn);
      }
      storyChoicesEl.classList.add("story-choices--await-reveal");
      void storyChoicesEl.offsetHeight;
      requestAnimationFrame(() => {
        storyChoicesEl.classList.remove("story-choices--await-reveal");
        storyChoicesEl.classList.add("story-choices--fade-reveal");
        scheduleStoryScrollLockToEnd();
      });
    }

    function runStoryTypewriter(bodyEl, fullText, choiceLines) {
      if (!bodyEl || !storyScrollEl) return;
      const myGen = storyTypewriterGeneration;
      const chunks = splitNarrativeForTypewriter(fullText);
      const TW_CHAR_DELAY_MIN_MS = 10;
      const TW_CHAR_DELAY_SPAN_MS = 6;
      const TW_LINE_PAUSE_MIN_MS = 200;
      const TW_LINE_PAUSE_SPAN_MS = 101;
      const TW_CHOICES_AFTER_DONE_MS = 300;
      const charDelayMs = () => TW_CHAR_DELAY_MIN_MS + Math.floor(Math.random() * TW_CHAR_DELAY_SPAN_MS);
      const linePauseMs = () => TW_LINE_PAUSE_MIN_MS + Math.floor(Math.random() * TW_LINE_PAUSE_SPAN_MS);

      function endTypingUi() {
        storyScrollEl.classList.remove("story-scroll--tw-skip");
        bodyEl.classList.remove("story-segment-body--typing");
        detachStoryTypewriterSkip();
      }

      function finishComplete() {
        if (storyTypewriterGeneration !== myGen) return;
        bodyEl.innerHTML = narrativeToSafeHtml(fullText);
        endTypingUi();
        const seg = bodyEl.parentElement;
        if (seg && choiceLines && choiceLines.length) appendChoicePreviewBlock(seg, choiceLines);
        scheduleStoryScrollLockToEnd();
        const genAtDone = myGen;
        setTimeout(() => {
          if (storyTypewriterGeneration !== genAtDone) return;
          revealStoryChoicesFadeIn(choiceLines);
          scheduleStoryScrollLockToEnd();
        }, TW_CHOICES_AFTER_DONE_MS);
      }

      function skipToEnd() {
        if (storyTypewriterGeneration !== myGen) return;
        storyTypewriterGeneration++;
        bodyEl.innerHTML = narrativeToSafeHtml(fullText);
        endTypingUi();
        const seg = bodyEl.parentElement;
        if (seg && choiceLines && choiceLines.length) appendChoicePreviewBlock(seg, choiceLines);
        revealStoryChoicesFadeIn(choiceLines);
        scheduleStoryScrollLockToEnd();
      }

      if (!fullText || !String(fullText).trim() || chunks.length === 0) {
        bodyEl.innerHTML = fullText ? narrativeToSafeHtml(String(fullText)) : "";
        endTypingUi();
        const seg0 = bodyEl.parentElement;
        if (seg0 && choiceLines && choiceLines.length) appendChoicePreviewBlock(seg0, choiceLines);
        revealStoryChoicesFadeIn(choiceLines);
        scheduleStoryScrollLockToEnd();
        return;
      }

      bodyEl.classList.add("story-segment-body--rich", "story-segment-body--typing");
      bodyEl.innerHTML = "";
      storyScrollEl.classList.add("story-scroll--tw-skip");
      if (gameRoot) gameRoot.classList.add("game-root--tw-skip");
      detachStoryTypewriterSkip();
      storyTypewriterSkipHandler = (ev) => {
        if (storyTypewriterGeneration !== myGen) return;
        if (!bodyEl.classList.contains("story-segment-body--typing")) return;
        if (ev.target.closest && ev.target.closest(".game-modal:not(.hidden)")) return;
        ev.preventDefault();
        ev.stopPropagation();
        skipToEnd();
      };
      if (gameRoot) gameRoot.addEventListener("click", storyTypewriterSkipHandler, true);

      let acc = "";
      let ci = 0;

      function runChunk() {
        if (storyTypewriterGeneration !== myGen) return;
        if (ci >= chunks.length) {
          finishComplete();
          return;
        }
        const chunk = chunks[ci];
        const chars = [...chunk];
        let gi = 0;
        function tick() {
          if (storyTypewriterGeneration !== myGen) return;
          if (gi >= chars.length) {
            ci++;
            setTimeout(runChunk, linePauseMs());
            return;
          }
          acc += chars[gi];
          gi++;
          bodyEl.innerHTML = typewriterHtmlWithTail(acc);
          requestAnimationFrame(() => {
            if (storyTypewriterGeneration !== myGen || !storyScrollEl) return;
            storyScrollEl.scrollTop = storyScrollEl.scrollHeight;
          });
          setTimeout(tick, charDelayMs());
        }
        tick();
      }
      runChunk();
    }

    function renderStoryFromState(gs, opts) {
      opts = opts || {};
      const animateLastAssistant = !!opts.animateLastAssistant;
      if (!storyScrollEl || !storyChoicesEl) return;
      detachStoryTypewriterSkip();
      storyScrollEl.classList.remove("story-scroll--tw-skip");
      storyTypewriterGeneration++;
      storyScrollEl.innerHTML = "";
      storyChoicesEl.innerHTML = "";
      storyChoicesEl.classList.remove("story-choices--await-reveal", "story-choices--fade-reveal");
      const filtered = filterMessagesForStory(gs.messages || []);
      if (filtered.length === 0) {
        scheduleStoryScrollLockToEnd();
        return;
      }
      let lastAi = -1;
      for (let i = filtered.length - 1; i >= 0; i--) {
        if (filtered[i].role === "assistant") {
          lastAi = i;
          break;
        }
      }
      for (let i = 0; i < filtered.length; i++) {
        const m = filtered[i];
        if (m.role === "user") {
          const line = formatUserActionLine(m.content);
          if (!line) continue;
          appendChronicleDivider();
          const div = document.createElement("div");
          div.className = "story-user-line";
          div.textContent = "◆ " + line;
          storyScrollEl.appendChild(div);
          continue;
        }
        if (m.role !== "assistant") continue;
        appendChronicleDivider();
        const bundle = parseAssistantDisplayBundle(m.content || "");
        const { body, choices } = storyChoicesFromBundle(bundle);
        const seg = document.createElement("div");
        seg.className = "story-segment";
        const bodyDiv = document.createElement("div");
        bodyDiv.className = "story-segment-body";
        const displayBody = choices.length > 0 ? body : (body || bundle.narrative);
        const animateThis = animateLastAssistant && i === lastAi;
        if (animateThis) {
          if (String(displayBody || "").trim()) {
            seg.appendChild(bodyDiv);
            storyScrollEl.appendChild(seg);
            runStoryTypewriter(bodyDiv, displayBody, choices);
          } else {
            bodyDiv.classList.add("story-segment-body--rich");
            bodyDiv.innerHTML = "";
            seg.appendChild(bodyDiv);
            storyScrollEl.appendChild(seg);
            appendChoicePreviewBlock(seg, choices);
            revealStoryChoicesFadeIn(choices);
            scheduleStoryScrollLockToEnd();
          }
        } else {
          setNarrativeHtml(bodyDiv, displayBody);
          seg.appendChild(bodyDiv);
          storyScrollEl.appendChild(seg);
          if (choices.length) appendChoicePreviewBlock(seg, choices);
        }
      }
      if (lastAi >= 0 && !animateLastAssistant) {
        const bundle = parseAssistantDisplayBundle(filtered[lastAi].content || "");
        const { choices } = storyChoicesFromBundle(bundle);
        revealStoryChoicesFadeIn(choices);
      }
      scheduleStoryScrollLockToEnd();
    }

    function fillModalWithChoices(modal, fullText) {
      const bodyEl = modal.querySelector(".game-modal-body");
      const choicesEl = modal.querySelector(".game-modal-choices");
      if (!bodyEl || !choicesEl) return;
      choicesEl.innerHTML = "";
      bodyEl.classList.remove("game-modal-body--rich");
      const bundle = parseAssistantDisplayBundle(String(fullText || ""));
      const { body, choices: choiceLines } = storyChoicesFromBundle(bundle);
      bodyEl.classList.add("game-modal-body--rich");
      if (choiceLines.length === 0) {
        bodyEl.innerHTML = narrativeToSafeHtml(bundle.narrative);
        return;
      }
      bodyEl.innerHTML = narrativeToSafeHtml(body || bundle.narrative);
      const modalId = modal.id;
      choiceLines.forEach((line) => {
        const btn = document.createElement("button");
        btn.type = "button";
        decorateChoiceButton(btn, line, true);
        btn.innerHTML = choiceLineToModalButtonHtml(line);
        btn.addEventListener("click", () => {
          closeModal(modalId);
          takeTurn(line);
        });
        choicesEl.appendChild(btn);
      });
    }

    async function openPanel(panel) {
      if (panel === "martial") {
        await openMartialModal();
        return;
      }
      if (panel === "inventory") {
        await openInventoryModal();
        return;
      }
      if (panel === "companions") {
        await openCompanionsModal();
        return;
      }
      if (panel === "quests") {
        await openQuestsModal();
        return;
      }
      if (panel === "attributes") {
        openAttributesModal();
        return;
      }
      const modalId = "modal-" + panel;
      const modal = document.getElementById(modalId);
      if (!modal) return;
      const loading = modal.querySelector(".game-modal-loading");
      const bodyEl = modal.querySelector(".game-modal-body");
      const choicesEl = modal.querySelector(".game-modal-choices");
      if (!bodyEl) {
        errEl.textContent = "此面板尚未實作";
        return;
      }
      closeModal("modal-attributes");
      openModalOnly(modalId);
      loading.classList.remove("hidden");
      bodyEl.classList.remove("game-modal-body--rich");
      bodyEl.textContent = "";
      if (choicesEl) choicesEl.innerHTML = "";
      errEl.textContent = "";
      buttons.forEach((b) => { b.disabled = true; });
      document.querySelectorAll("#story-choices .story-choice-btn").forEach((b) => { b.disabled = true; });
      try {
        const res = await fetch(API_PANEL, {
          method: "POST",
          headers: authHeaders(true),
          body: JSON.stringify({ panel }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) {
          localStorage.removeItem(TOKEN_KEY);
          closeModal(modalId);
          showAuth();
          errEl.textContent = "登入已失效,請重新登入";
          return;
        }
        if (!res.ok) {
          const d = data.detail;
          const msg = Array.isArray(d) ? d.map((x) => x.msg || x).join(" ") : (d || res.statusText);
          const m = msg || "讀取失敗";
          bodyEl.classList.remove("game-modal-body--rich");
          bodyEl.textContent = m;
          if (choicesEl) choicesEl.innerHTML = "";
          errEl.textContent = m;
        } else {
          fillModalWithChoices(modal, data.display || "");
        }
      } catch (e) {
        const m = String(e.message || e);
        if (!bodyEl.textContent) {
          bodyEl.classList.remove("game-modal-body--rich");
          bodyEl.textContent = m;
        }
        if (choicesEl) choicesEl.innerHTML = "";
        errEl.textContent = m;
      } finally {
        loading.classList.add("hidden");
        buttons.forEach((b) => { b.disabled = false; });
        document.querySelectorAll("#story-choices .story-choice-btn").forEach((b) => { b.disabled = false; });
      }
    }

    function getToken() {
      return localStorage.getItem(TOKEN_KEY);
    }

    function authHeaders(withJson) {
      const h = {};
      if (withJson) h["Content-Type"] = "application/json";
      const t = getToken();
      if (t) h.Authorization = "Bearer " + t;
      return h;
    }

    function syncSidebarIdentityRow() {
      const rk = document.getElementById("v-rank");
      const rh = document.getElementById("v-rank-hint");
      const st = document.getElementById("v-status");
      const ms = document.getElementById("v-mental-state");
      const sn = document.getElementById("v-player-name-sidebar");
      let nmFromCore = "";
      if (currentGameState && currentGameState.core_save && currentGameState.core_save.identity) {
        nmFromCore = String(currentGameState.core_save.identity["名號"] || "").trim();
      }
      if (nmFromCore && displayPlayerName) {
        displayPlayerName.textContent = nmFromCore;
      }
      if (sn && displayPlayerName) {
        const nm = nmFromCore || (displayPlayerName.textContent || "").trim();
        sn.textContent = nm || "—";
      }
      if (!currentGameState) {
        if (rk) rk.textContent = "凡胎肉身";
        if (rh) {
          rh.title = "當前修為尚未以核心心法為基(凡胎/雜學或僅內外門技)";
          rh.setAttribute("aria-label", rh.title);
        }
        if (st) st.textContent = "健康";
        if (ms) ms.textContent = "清醒";
        return;
      }
      const r = currentGameState.rank;
      const s = currentGameState.status;
      const m = currentGameState.mental_state;
      const core = (currentGameState.rank_core_heart != null && String(currentGameState.rank_core_heart).trim())
        ? String(currentGameState.rank_core_heart).trim()
        : "";
      if (rk) rk.textContent = (r != null && String(r).trim()) ? String(r).trim() : "凡胎肉身";
      if (rh) {
        rh.title = core
          ? "當前修為由\"" + core + "\"支撐"
          : "當前修為尚未以核心心法為基(凡胎/雜學或僅內外門技)";
        rh.setAttribute("aria-label", rh.title);
      }
      if (st) st.textContent = (s != null && String(s).trim()) ? String(s).trim() : "健康";
      if (ms) ms.textContent = (m != null && String(m).trim()) ? String(m).trim() : "清醒";
    }

    function setBars() {
      STAT_KEYS.forEach((k) => {
        const v = stats[k] ?? DEFAULT_STATS[k];
        const vel = document.getElementById("v-" + k);
        const bel = document.getElementById("b-" + k);
        if (vel) vel.textContent = String(v);
        if (bel) bel.style.width = v + "%";
      });
      if (currentGameState) setLocationDisplay(currentGameState.current_location);
      syncSidebarIdentityRow();
    }

    function normalizeLocationFromServer(loc) {
      const out = { ...DEFAULT_LOCATION };
      if (!loc || typeof loc !== "object") return out;
      LOCATION_KEYS.forEach((k) => {
        if (loc[k] == null || loc[k] === "") return;
        const s = String(loc[k]).trim();
        if (s) out[k] = s;
      });
      return out;
    }

    function setLocationDisplay(loc) {
      const n = normalizeLocationFromServer(loc);
      LOCATION_KEYS.forEach((k) => {
        const el = document.getElementById(LOCATION_VALUE_IDS[k]);
        if (el) el.textContent = n[k] || "—";
      });
    }

    function applyGameState(gs, opts) {
      if (!gs) return;
      currentGameState = gs;
      if (gs.stats && typeof gs.stats === "object") {
        stats = normalizeStatsFromServer(gs.stats);
      }
      setBars();
      renderStoryFromState(gs, opts);
      const mm = document.getElementById("modal-martial");
      const mMount = document.getElementById("ma-modal-mount");
      if (mm && mMount && !mm.classList.contains("hidden") && !mMount.classList.contains("hidden")) {
        renderMartialModal(gs);
      }
    }

    function showAuth() {
      authOverlay.classList.remove("hidden");
      gameRoot.classList.add("hidden");
    }

    function showGame() {
      authOverlay.classList.add("hidden");
      gameRoot.classList.remove("hidden");
    }

    function setLoading(on) {
      buttons.forEach((b) => { b.disabled = on; });
      customInput.disabled = on;
      sendCustomBtn.disabled = on;
      document.querySelectorAll("#story-choices .story-choice-btn").forEach((b) => { b.disabled = on; });
      const brs = document.getElementById("btn-realm-shuttle");
      if (brs) brs.disabled = on;
      document.querySelectorAll(".realm-shuttle-option").forEach((b) => { b.disabled = on; });
    }

    async function realmShuttle(realmId) {
      errEl.textContent = "";
      setLoading(true);
      try {
        const res = await fetch(API_REALM_SHUTTLE, {
          method: "POST",
          headers: authHeaders(true),
          body: JSON.stringify({ realm: String(realmId) }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) {
          localStorage.removeItem(TOKEN_KEY);
          showAuth();
          throw new Error("登入已失效,請重新登入");
        }
        if (!res.ok) {
          const d = data.detail;
          const msg = Array.isArray(d) ? d.map((x) => x.msg || x).join(" ") : (d || res.statusText);
          throw new Error(msg || "界域穿梭失敗");
        }
        closeModal("modal-realm-shuttle");
        if (data.game_state) {
          applyGameState(data.game_state, { animateLastAssistant: true });
        }
      } catch (e) {
        errEl.textContent = String(e.message || e);
      } finally {
        setLoading(false);
      }
    }

    async function takeTurn(choice, opts) {
      const clearCustomOnSuccess = opts && opts.clearCustom === true;
      errEl.textContent = "";
      setLoading(true);
      setCausalSettlementVisible(true);
      try {
        const res = await fetch(API_TURN_STREAM, {
          method: "POST",
          headers: { ...authHeaders(true), Accept: "text/event-stream" },
          body: JSON.stringify({ choice: String(choice) }),
        });
        if (res.status === 401) {
          localStorage.removeItem(TOKEN_KEY);
          showAuth();
          throw new Error("登入已失效,請重新登入");
        }
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          const d = data.detail;
          const msg = Array.isArray(d) ? d.map((x) => x.msg || x).join(" ") : (d || res.statusText);
          throw new Error(msg || "請求失敗");
        }
        if (!res.body || typeof res.body.getReader !== "function") {
          throw new Error("此瀏覽器不支援串流回應");
        }
        if (typeof window.consumeBladeTurnSse !== "function") {
          throw new Error("缺少 script.js(consumeBladeTurnSse)");
        }
        const reader = res.body.getReader();
        let liveBodyDiv = null;
        let liveText = "";
        if (storyScrollEl) {
          detachStoryTypewriterSkip();
          storyScrollEl.classList.remove("story-scroll--tw-skip");
          storyTypewriterGeneration++;
          storyScrollEl.innerHTML = "";
          if (storyChoicesEl) {
            storyChoicesEl.innerHTML = "";
            storyChoicesEl.classList.remove("story-choices--await-reveal", "story-choices--fade-reveal");
          }
          const seg = document.createElement("div");
          seg.className = "story-segment";
          liveBodyDiv = document.createElement("div");
          liveBodyDiv.className = "story-segment-body story-segment-body--rich";
          seg.appendChild(liveBodyDiv);
          storyScrollEl.appendChild(seg);
        }
        const finalPayload = await window.consumeBladeTurnSse(reader, (delta) => {
          liveText += delta;
          if (liveBodyDiv) {
            liveBodyDiv.textContent = liveText;
            scheduleStoryScrollLockToEnd();
          }
        });
        applyGameState(finalPayload.game_state, { animateLastAssistant: false });
        if (clearCustomOnSuccess) customInput.value = "";
      } catch (e) {
        errEl.textContent = String(e.message || e);
      } finally {
        setCausalSettlementVisible(false);
        setLoading(false);
      }
    }

    function submitCustom() {
      const text = customInput.value.trim();
      if (!text) return;
      takeTurn(text, { clearCustom: true });
    }

    document.getElementById("btn-show-register").addEventListener("click", () => {
      authErr.textContent = "";
      loginPanel.classList.add("hidden");
      registerPanel.classList.remove("hidden");
    });
    document.getElementById("btn-show-login").addEventListener("click", () => {
      authErr.textContent = "";
      registerPanel.classList.add("hidden");
      loginPanel.classList.remove("hidden");
    });

    document.getElementById("btn-login").addEventListener("click", async () => {
      authErr.textContent = "";
      const username = document.getElementById("login-user").value.trim();
      const password = document.getElementById("login-pass").value;
      if (!username || !password) {
        authErr.textContent = "請輸入帳號與密碼";
        return;
      }
      try {
        const res = await fetch(API_LOGIN, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const d = data.detail;
          const msg = Array.isArray(d) ? d.map((x) => x.msg || x).join(" ") : (d || "登入失敗");
          authErr.textContent = msg;
          return;
        }
        localStorage.setItem(TOKEN_KEY, data.token);
        displayPlayerName.textContent = data.player_name || "—";
        applyGameState(data.game_state);
        showGame();
      } catch (e) {
        authErr.textContent = String(e.message || e);
      }
    });

    document.getElementById("btn-register").addEventListener("click", async () => {
      authErr.textContent = "";
      regWaitHint.textContent = "";
      const username = document.getElementById("reg-user").value.trim();
      const password = document.getElementById("reg-pass").value;
      const player_name = document.getElementById("reg-name").value.trim();
      if (!username || !password || !player_name) {
        authErr.textContent = "請填寫帳號,密碼與遊戲名號";
        return;
      }
      const btnReg = document.getElementById("btn-register");
      btnReg.disabled = true;
      regWaitHint.textContent = "正在編織萬界開局,請稍候...";
      try {
        const res = await fetch(API_REGISTER, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, player_name }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const d = data.detail;
          const msg = Array.isArray(d) ? d.map((x) => x.msg || x).join(" ") : (d || "註冊失敗");
          authErr.textContent = msg;
          regWaitHint.textContent = "";
          return;
        }
        localStorage.setItem(TOKEN_KEY, data.token);
        displayPlayerName.textContent = data.player_name || "—";
        applyGameState(data.game_state);
        regWaitHint.textContent = "";
        showGame();
      } catch (e) {
        authErr.textContent = String(e.message || e);
        regWaitHint.textContent = "";
      } finally {
        btnReg.disabled = false;
      }
    });

    document.getElementById("btn-bingjie").addEventListener("click", async () => {
      const ok = await showGameConfirm("兵解將使因果盡散,你確定要遁入輪迴嗎?");
      if (!ok) return;
      errEl.textContent = "";
      setLoading(true);
      try {
        const res = await fetch(API_RESET_GAME, {
          method: "POST",
          headers: authHeaders(true),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) {
          localStorage.removeItem(TOKEN_KEY);
          showAuth();
          return;
        }
        if (!res.ok) {
          const d = data.detail;
          const msg = Array.isArray(d) ? d.map((x) => x.msg || x).join(" ") : (d || "兵解失敗");
          errEl.textContent = msg;
          return;
        }
        window.location.reload();
      } catch (e) {
        errEl.textContent = String(e.message || e);
      } finally {
        setLoading(false);
      }
    });

    document.getElementById("btn-logout").addEventListener("click", async () => {
      try {
        await fetch(API_LOGOUT, { method: "POST", headers: authHeaders(false) });
      } catch (_) { /* ignore */ }
      localStorage.removeItem(TOKEN_KEY);
      errEl.textContent = "";
      showAuth();
    });

    buttons.forEach((btn) => {
      btn.addEventListener("click", () => {
        const panel = btn.getAttribute("data-panel");
        if (panel === "inventory") {
          openInventoryModal();
          return;
        }
        if (panel === "martial") {
          openMartialModal();
          return;
        }
        if (panel === "companions") {
          openCompanionsModal();
          return;
        }
        if (panel === "attributes") {
          openAttributesModal();
          return;
        }
        if (panel) openPanel(panel);
      });
    });

    document.getElementById("btn-open-rename").addEventListener("click", () => {
      closeModal("modal-attributes");
      renameInput.value = displayPlayerName.textContent.trim() === "—" ? "" : displayPlayerName.textContent.trim();
      openModalOnly("modal-rename");
      renameInput.focus();
    });

    renameInput.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") {
        ev.preventDefault();
        document.getElementById("btn-rename-save").click();
      }
    });

    document.getElementById("btn-rename-save").addEventListener("click", async () => {
      const name = renameInput.value.trim();
      if (!name) return;
      errEl.textContent = "";
      try {
        const res = await fetch(API_RENAME, {
          method: "PATCH",
          headers: authHeaders(true),
          body: JSON.stringify({ player_name: name }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) {
          localStorage.removeItem(TOKEN_KEY);
          closeModal("modal-rename");
          showAuth();
          return;
        }
        if (!res.ok) {
          const d = data.detail;
          const msg = Array.isArray(d) ? d.map((x) => x.msg || x).join(" ") : (d || "更新失敗");
          errEl.textContent = msg;
          return;
        }
        displayPlayerName.textContent = data.player_name || name;
        syncSidebarIdentityRow();
        closeModal("modal-rename");
      } catch (e) {
        errEl.textContent = String(e.message || e);
      }
    });

    sendCustomBtn.addEventListener("click", () => submitCustom());
    customInput.addEventListener("keydown", (ev) => {
      if (ev.key === "Enter") {
        ev.preventDefault();
        submitCustom();
      }
    });
    customInput.addEventListener("focus", () => {
      requestAnimationFrame(() => {
        const row = customInput.closest(".custom-action-row");
        if (row) row.scrollIntoView({ block: "nearest", behavior: "smooth" });
        const story = document.getElementById("story-scroll");
        if (story) story.scrollTo({ top: story.scrollHeight, behavior: "smooth" });
      });
    });

    if (window.BladeGodMode && typeof window.BladeGodMode.init === "function") {
      window.BladeGodMode.init({
        apiUrl: API_UPDATE_GOD_MODE,
        modalId: "modal-attributes",
        authHeadersFn: () => authHeaders(true),
        getGameState: () => currentGameState,
        applyGameState: (gs, opts) =>
          applyGameState(gs, opts != null ? opts : { animateLastAssistant: false }),
        setError: (msg) => {
          errEl.textContent = msg || "";
        },
        setLoading,
        onUnauthorized: () => {
          localStorage.removeItem(TOKEN_KEY);
          showAuth();
        },
      });
    }

    (async function boot() {
      const t = getToken();
      if (!t) {
        showAuth();
        return;
      }
      try {
        const res = await fetch(API_ME, { headers: authHeaders(false) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          localStorage.removeItem(TOKEN_KEY);
          showAuth();
          return;
        }
        displayPlayerName.textContent = data.player_name || "—";
        applyGameState(data.game_state);
        showGame();
      } catch (_) {
        localStorage.removeItem(TOKEN_KEY);
        showAuth();
      }
    })();
  </script>
</body>
</html>
